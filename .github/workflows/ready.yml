   name: Generate Shorts Batch

   on:
     schedule:
       - cron: "0 6 * * *"
       - cron: "0 12 * * *"
       - cron: "0 18 * * *"
     workflow_dispatch:

   jobs:
     call-endpoint:
       runs-on: ubuntu-latest
       permissions:
         contents: write

       steps:
         - name: Checkout repo
           uses: actions/checkout@v4

         - name: Create output folder
           run: mkdir -p outputs

         - name: Call Railway concept endpoint
           run: |
             curl --fail --silent "https://bobo-shorts-automation-production.up.railway.app/generate-concept-json" > outputs/latest.json

         - name: Create timestamped copy
           run: |
             cp outputs/latest.json "outputs/concept-$(date -u +%Y%m%d-%H%M%S).json"

         - name: Commit generated JSON
           run: |
             git config user.name "github-actions[bot]"
             git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
             git add outputs/
             git commit -m "Add generated concept JSON" || echo "No changes to commit"
             git push
